<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carte des acteurs VBG — Kolda</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat/dist/leaflet-heat.js"></script>
</head>
<body>

<header>
  <h1>Carte des acteurs VBG — Sénégal / Région de Kolda</h1>
  <p>Sénégal en contexte, départements concernés mis en évidence, points acteurs et heatmap.</p>

  <div class="top-links">
    <a href="../">Accueil</a>
    <a href="../table/">Base de données</a>
    <a href="../analysis/">Analyse</a>
  </div>
</header>

<div class="container">
  <div class="card" style="padding:16px;">
    <div class="filters" style="margin-bottom:12px;">
      <div class="filter-group">
        <label>Type d’acteur</label>
        <select id="actorFilter">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Département</label>
        <select id="deptFilter">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Type de service VBG</label>
        <select id="serviceFilter">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Affichage</label>
        <select id="viewMode">
          <option value="markers">Points acteurs</option>
          <option value="heatmap">Heatmap services</option>
        </select>
      </div>
    </div>

    <div id="map"></div>
  </div>
</div>

<script>
const CSV_URL = "../data/actors_vbg_kolda_geo_ready.csv";
const ADMIN_URL = "../data/sen_admin2_em.json";

const COLORS = {
  state: "#1f5fa8",
  osc: "#f58220",
  selectedDept: "#c94f4f",
  regionHighlight: "#1f8f6a",
  otherDept: "#b8c4d4"
};

let allRows = [];
let adminGeo = null;
let actorLayer = null;
let heatLayer = null;
let adminLayer = null;
let legendControl = null;

const actorFilter = document.getElementById("actorFilter");
const deptFilter = document.getElementById("deptFilter");
const serviceFilter = document.getElementById("serviceFilter");
const viewMode = document.getElementById("viewMode");

const map = L.map("map").setView([14.4, -14.4], 7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

function safe(v){ return (v ?? "").toString().trim(); }

function splitValues(value){
  return safe(value).split(";").map(v => v.trim()).filter(Boolean);
}

function uniqueSorted(values){
  return [...new Set(values.filter(Boolean))].sort((a,b)=>a.localeCompare(b, "fr"));
}

function normalizeDeptName(name){
  const n = safe(name).toLowerCase();
  if (n === "médina yorofoulah" || n === "medina yorofoula" || n === "médina-yorofoula" || n === "medina-yorofoula" || n === "médina yoro foulah") {
    return "Médina Yoro Foulah";
  }
  if (n === "velingara") return "Vélingara";
  if (n === "kolda") return "Kolda";
  return safe(name);
}

function isStateActor(type){
  return safe(type).toLowerCase().includes("étatique");
}

function pointColor(actorType){
  return isStateActor(actorType) ? COLORS.state : COLORS.osc;
}

function saveFilters(){
  const filters = {
    actor: actorFilter.value,
    dept: deptFilter.value,
    service: serviceFilter.value
  };
  localStorage.setItem("vbg_kolda_filters", JSON.stringify(filters));
}

function loadFilters(){
  try{
    const raw = localStorage.getItem("vbg_kolda_filters");
    if(!raw) return;
    const f = JSON.parse(raw);
    if (f.actor) actorFilter.value = f.actor;
    if (f.dept) deptFilter.value = f.dept;
    if (f.service) serviceFilter.value = f.service;
  }catch(e){}
}

function populateFilters(rows){
  const actorTypes = uniqueSorted(rows.map(r => safe(r.actor_type)));
  const departments = uniqueSorted(rows.flatMap(r => splitValues(r["departement(s)"]).map(normalizeDeptName)));
  const services = uniqueSorted(rows.flatMap(r => splitValues(r.service_gbv_type)));

  actorFilter.innerHTML = `<option value="">Tous</option>` + actorTypes.map(t => `<option value="${t}">${t}</option>`).join("");
  deptFilter.innerHTML = `<option value="">Tous</option>` + departments.map(d => `<option value="${d}">${d}</option>`).join("");
  serviceFilter.innerHTML = `<option value="">Tous</option>` + services.map(s => `<option value="${s}">${s}</option>`).join("");

  loadFilters();
}

function actorMatches(row){
  const actor = safe(actorFilter.value);
  const dept = safe(deptFilter.value);
  const service = safe(serviceFilter.value);

  const actorOk = !actor || safe(row.actor_type) === actor;
  const rowDepts = splitValues(row["departement(s)"]).map(normalizeDeptName);
  const deptOk = !dept || rowDepts.includes(dept);
  const serviceOk = !service || splitValues(row.service_gbv_type).includes(service);

  return actorOk && deptOk && serviceOk;
}

function buildPopup(r){
  return `
    <strong>${safe(r.structure)}</strong><br>
    <b>Type :</b> ${safe(r.actor_type)}<br>
    <b>Services :</b> ${safe(r.service_gbv_type)}<br>
    <b>Domaines :</b> ${safe(r.service_domains)}<br>
    <b>Département(s) :</b> ${safe(r["departement(s)"])}<br>
    <b>Commune(s) :</b> ${safe(r["commune(s)"])}<br>
    <b>Contact :</b> ${safe(r.contact_name)}<br>
    <b>Téléphone :</b> ${safe(r.phone)}<br>
    <b>Email :</b> ${safe(r.email)}
  `;
}

function clearDynamicLayers(){
  if (actorLayer) map.removeLayer(actorLayer);
  if (heatLayer) map.removeLayer(heatLayer);
}

function departmentInScope(name){
  const n = normalizeDeptName(name);
  return ["Kolda", "Vélingara", "Médina Yoro Foulah"].includes(n);
}

function drawAdminLayer(){
  if (adminLayer) map.removeLayer(adminLayer);

  const selectedDept = safe(deptFilter.value);

  adminLayer = L.geoJSON(adminGeo, {
    style: function(feature){
      const deptName = normalizeDeptName(feature.properties?.adm2_name);
      const inScope = departmentInScope(deptName);
      const isSelected = selectedDept && deptName === selectedDept;

      if (isSelected) {
        return {
          color: COLORS.selectedDept,
          weight: 3,
          fillColor: COLORS.selectedDept,
          fillOpacity: 0.30
        };
      }

      if (inScope) {
        return {
          color: COLORS.regionHighlight,
          weight: 2.5,
          fillColor: COLORS.regionHighlight,
          fillOpacity: 0.18
        };
      }

      return {
        color: COLORS.otherDept,
        weight: 1,
        fillColor: COLORS.otherDept,
        fillOpacity: 0.04
      };
    },
    onEachFeature: function(feature, layer){
      const p = feature.properties || {};
      const deptName = normalizeDeptName(p.adm2_name);
      const inScope = departmentInScope(deptName);
      layer.bindPopup(`
        <strong>${deptName}</strong><br>
        <b>Région :</b> ${safe(p.adm1_name)}<br>
        <b>Département ciblé :</b> ${inScope ? "Oui" : "Non"}
      `);
    }
  }).addTo(map);
}

function drawLegend(){
  if (legendControl) map.removeControl(legendControl);

  legendControl = L.control({ position: "bottomright" });

  legendControl.onAdd = function(){
    const div = L.DomUtil.create("div", "legend-box");
    div.innerHTML = `
      <div class="legend-title">Légende</div>
      <div class="legend-item"><span class="legend-swatch" style="background:${COLORS.regionHighlight};"></span> Départements ciblés (Kolda, Vélingara, Médina Yoro Foulah)</div>
      <div class="legend-item"><span class="legend-swatch" style="background:${COLORS.selectedDept};"></span> Département filtré</div>
      <div class="legend-item"><span class="legend-swatch" style="background:${COLORS.otherDept};"></span> Autres départements du Sénégal</div>
      <div class="legend-item"><span class="legend-dot" style="background:${COLORS.state};"></span> Service étatique</div>
      <div class="legend-item"><span class="legend-dot" style="background:${COLORS.osc};"></span> ONG / Association</div>
      <div class="legend-item"><span class="legend-swatch" style="background:linear-gradient(90deg,#2b83ba,#abdda4,#fdae61,#d7191c);"></span> Heatmap concentration services</div>
    `;
    return div;
  };

  legendControl.addTo(map);
}

function redrawActors(){
  clearDynamicLayers();
  saveFilters();

  const rows = allRows.filter(actorMatches).filter(r => safe(r.latitude) && safe(r.longitude));

  if (viewMode.value === "markers") {
    actorLayer = L.layerGroup();

    rows.forEach(r => {
      const lat = parseFloat(r.latitude);
      const lon = parseFloat(r.longitude);
      const color = pointColor(r.actor_type);

      const marker = L.circleMarker([lat, lon], {
        radius: 7,
        color: "#ffffff",
        weight: 2,
        fillColor: color,
        fillOpacity: 0.95
      }).bindPopup(buildPopup(r));

      actorLayer.addLayer(marker);
    });

    actorLayer.addTo(map);
  } else {
    const pts = rows.map(r => [parseFloat(r.latitude), parseFloat(r.longitude), 0.9]);
    heatLayer = L.heatLayer(pts, { radius: 28, blur: 18, maxZoom: 12 });
    heatLayer.addTo(map);
  }

  drawAdminLayer();
  drawLegend();
}

Promise.all([
  fetch(ADMIN_URL).then(r => r.json()),
  new Promise((resolve, reject) => {
    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: res => resolve(res.data || []),
      error: reject
    });
  })
]).then(([geo, rows]) => {
  adminGeo = geo;
  allRows = rows;

  populateFilters(allRows);
  redrawActors();

  const bounds = L.geoJSON(adminGeo).getBounds();
  if (bounds.isValid()) map.fitBounds(bounds);
});

actorFilter.addEventListener("change", redrawActors);
deptFilter.addEventListener("change", redrawActors);
serviceFilter.addEventListener("change", redrawActors);
viewMode.addEventListener("change", redrawActors);
</script>

</body>
</html>
