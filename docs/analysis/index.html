<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analyse du système VBG — Kolda</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Analyse du système VBG — Région de Kolda</h1>
  <p>Tableau de bord analytique synchronisé avec les filtres de la carte.</p>

  <div class="top-links">
    <a href="../">Accueil</a>
    <a href="../table/">Base de données</a>
    <a href="../map/">Carte</a>
  </div>
</header>

<div class="container">

  <div class="filters" style="margin-bottom:16px;">
    <div class="filter-group">
      <label>Type d’acteur</label>
      <select id="actorFilter"><option value="">Tous</option></select>
    </div>

    <div class="filter-group">
      <label>Département</label>
      <select id="deptFilter"><option value="">Tous</option></select>
    </div>

    <div class="filter-group">
      <label>Type de service VBG</label>
      <select id="serviceFilter"><option value="">Tous</option></select>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="label">Total acteurs</div>
      <div class="value" id="kpiActors">0</div>
    </div>
    <div class="kpi">
      <div class="label">Services étatiques</div>
      <div class="value" id="kpiState">0</div>
    </div>
    <div class="kpi">
      <div class="label">ONG / Associations</div>
      <div class="value" id="kpiOsc">0</div>
    </div>
    <div class="kpi">
      <div class="label">Types de services VBG</div>
      <div class="value" id="kpiServices">0</div>
    </div>
  </div>

  <div class="grid" style="margin-bottom:24px;">
    <div class="chart-card"><canvas id="chartActors"></canvas></div>
    <div class="chart-card"><canvas id="chartDepartments"></canvas></div>
    <div class="chart-card"><canvas id="chartServices"></canvas></div>
    <div class="chart-card"><canvas id="chartCoverage"></canvas></div>
  </div>

  <div class="grid" style="margin-bottom:24px;">
    <div class="chart-card"><canvas id="chartGaps"></canvas></div>
    <div class="chart-card">
      <h2 class="section-title">Indice de couverture VBG</h2>
      <div id="coverageIndexBox"></div>
    </div>
  </div>

</div>

<script>
const CSV_URL = "../data/actors_vbg_kolda_geo_ready.csv";
const BLUE = "#1f5fa8";
const ORANGE = "#f58220";
const GRAY = "#93a1b2";

let rawRows = [];
let charts = [];

const actorFilter = document.getElementById("actorFilter");
const deptFilter = document.getElementById("deptFilter");
const serviceFilter = document.getElementById("serviceFilter");

function safe(v){ return (v ?? "").toString().trim(); }

function splitValues(v){
  return safe(v).split(";").map(x => x.trim()).filter(Boolean);
}

function normalizeDeptName(name){
  const n = safe(name).toLowerCase();
  if (n === "médina yorofoulah" || n === "medina yorofoula" || n === "médina-yorofoula" || n === "medina-yorofoula" || n === "médina yoro foulah") {
    return "Médina Yoro Foulah";
  }
  if (n === "velingara") return "Vélingara";
  if (n === "kolda") return "Kolda";
  return safe(name);
}

function uniqueSorted(values){
  return [...new Set(values.filter(Boolean))].sort((a,b)=>a.localeCompare(b, "fr"));
}

function countBy(rows, accessor){
  const out = {};
  rows.forEach(r => {
    const key = accessor(r);
    if(!key) return;
    out[key] = (out[key] || 0) + 1;
  });
  return out;
}

function countMulti(rows, accessor){
  const out = {};
  rows.forEach(r => {
    accessor(r).forEach(v => {
      if(!v) return;
      out[v] = (out[v] || 0) + 1;
    });
  });
  return out;
}

function classifyGap(text){
  const t = safe(text).toLowerCase();
  if (t.includes("financement") || t.includes("budget") || t.includes("ressources financières")) return "Financement";
  if (t.includes("logistique") || t.includes("déplacement") || t.includes("transport")) return "Logistique";
  if (t.includes("ressources humaines") || t.includes("personnel") || t.includes("rh")) return "Ressources humaines";
  if (t.includes("résistance") || t.includes("socioculturel") || t.includes("normes")) return "Contraintes socioculturelles";
  if (t.includes("hébergement") || t.includes("locaux") || t.includes("infrastructure")) return "Infrastructure / accueil";
  if (t.includes("coordination") || t.includes("chevauchement")) return "Coordination";
  if (t.includes("médicament") || t.includes("médicale") || t.includes("médical")) return "Capacité technique / intrants";
  return "Autres";
}

function saveFilters(){
  const filters = {
    actor: actorFilter.value,
    dept: deptFilter.value,
    service: serviceFilter.value
  };
  localStorage.setItem("vbg_kolda_filters", JSON.stringify(filters));
}

function loadFilters(){
  try{
    const raw = localStorage.getItem("vbg_kolda_filters");
    if(!raw) return;
    const f = JSON.parse(raw);
    if (f.actor) actorFilter.value = f.actor;
    if (f.dept) deptFilter.value = f.dept;
    if (f.service) serviceFilter.value = f.service;
  }catch(e){}
}

function populateFilters(rows){
  const actorTypes = uniqueSorted(rows.map(r => safe(r.actor_type)));
  const departments = uniqueSorted(rows.flatMap(r => splitValues(r["departement(s)"]).map(normalizeDeptName)));
  const services = uniqueSorted(rows.flatMap(r => splitValues(r.service_gbv_type)));

  actorFilter.innerHTML = `<option value="">Tous</option>` + actorTypes.map(t => `<option value="${t}">${t}</option>`).join("");
  deptFilter.innerHTML = `<option value="">Tous</option>` + departments.map(d => `<option value="${d}">${d}</option>`).join("");
  serviceFilter.innerHTML = `<option value="">Tous</option>` + services.map(s => `<option value="${s}">${s}</option>`).join("");

  loadFilters();
}

function getFilteredRows(){
  const actor = safe(actorFilter.value);
  const dept = safe(deptFilter.value);
  const service = safe(serviceFilter.value);

  return rawRows.filter(r => {
    const actorOk = !actor || safe(r.actor_type) === actor;
    const deptOk = !dept || splitValues(r["departement(s)"]).map(normalizeDeptName).includes(dept);
    const serviceOk = !service || splitValues(r.service_gbv_type).includes(service);
    return actorOk && deptOk && serviceOk;
  });
}

function destroyCharts(){
  charts.forEach(c => c.destroy());
  charts = [];
}

function createChart(id, type, labels, data, label, color){
  const chart = new Chart(document.getElementById(id), {
    type,
    data: {
      labels,
      datasets: [{
        label,
        data,
        backgroundColor: Array.isArray(color) ? color : color,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: type === "pie" || type === "doughnut" }
      },
      scales: type === "pie" || type === "doughnut" ? {} : {
        y: { beginAtZero: true }
      }
    }
  });
  charts.push(chart);
}

function renderCoverageIndex(rows){
  const deptActors = countMulti(rows, r => splitValues(r["departement(s)"]).map(normalizeDeptName));
  const deptServices = {};

  rows.forEach(r => {
    const depts = splitValues(r["departement(s)"]).map(normalizeDeptName);
    const services = splitValues(r.service_gbv_type);
    depts.forEach(d => {
      if(!deptServices[d]) deptServices[d] = new Set();
      services.forEach(s => deptServices[d].add(s));
    });
  });

  const depts = Object.keys(deptActors).sort((a,b)=>a.localeCompare(b,"fr"));
  document.getElementById("coverageIndexBox").innerHTML = depts.map(d => {
    const actorCount = deptActors[d] || 0;
    const serviceCount = deptServices[d] ? deptServices[d].size : 0;
    const index = actorCount + serviceCount;
    return `
      <div style="padding:12px;border:1px solid rgba(11,18,32,.12);border-radius:10px;margin-bottom:10px;">
        <strong>${d}</strong><br>
        <span class="small">Acteurs : ${actorCount}</span><br>
        <span class="small">Types de services : ${serviceCount}</span><br>
        <span style="font-weight:800;color:${BLUE};font-size:18px;">Indice : ${index}</span>
      </div>
    `;
  }).join("");
}

function redrawAnalysis(){
  saveFilters();

  const rows = getFilteredRows();
  destroyCharts();

  const totalActors = rows.length;
  const stateActors = rows.filter(r => safe(r.actor_type).toLowerCase().includes("étatique")).length;
  const oscActors = totalActors - stateActors;
  const uniqueServices = [...new Set(rows.flatMap(r => splitValues(r.service_gbv_type)))].length;

  document.getElementById("kpiActors").textContent = totalActors;
  document.getElementById("kpiState").textContent = stateActors;
  document.getElementById("kpiOsc").textContent = oscActors;
  document.getElementById("kpiServices").textContent = uniqueServices;

  const actorCounts = countBy(rows, r => safe(r.actor_type));
  createChart("chartActors", "pie", Object.keys(actorCounts), Object.values(actorCounts), "Acteurs par type", [BLUE, ORANGE, GRAY]);

  const deptCounts = countMulti(rows, r => splitValues(r["departement(s)"]).map(normalizeDeptName));
  createChart("chartDepartments", "bar", Object.keys(deptCounts), Object.values(deptCounts), "Acteurs par département", BLUE);

  const serviceCounts = countMulti(rows, r => splitValues(r.service_gbv_type));
  createChart("chartServices", "bar", Object.keys(serviceCounts), Object.values(serviceCounts), "Types de services VBG", ORANGE);

  const coverageCounts = countBy(rows, r => safe(r.coverage_level));
  createChart("chartCoverage", "bar", Object.keys(coverageCounts), Object.values(coverageCounts), "Niveau de couverture", "#5b6b80");

  const gapClasses = {};
  rows.forEach(r => {
    const g = classifyGap(r.gaps);
    gapClasses[g] = (gapClasses[g] || 0) + 1;
  });

  createChart("chartGaps", "bar", Object.keys(gapClasses), Object.values(gapClasses), "Gaps dominants", "#c94f4f");

  renderCoverageIndex(rows);
}

Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(res){
    rawRows = res.data || [];
    populateFilters(rawRows);
    redrawAnalysis();
  }
});

actorFilter.addEventListener("change", redrawAnalysis);
deptFilter.addEventListener("change", redrawAnalysis);
serviceFilter.addEventListener("change", redrawAnalysis);
</script>

</body>
</html>
